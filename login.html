<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login-Sharma Family</title>

     <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
</head>
<body>
    
    <div class="login-container">
        <div class="login-box">
            <h2>Sharma Family</h2>
            <p>Member login</p>

            <form id="loginForm">

    <input
        type="email"
        id="email"
        placeholder="Email Address"
        required>

    <input
        type="password"
        id="password"
        placeholder="Password"
        required>

    <button type="submit">
        Login
    </button>

</form>

<script type="module" src="js/login.js"></script>
        </div>
    </div>
</body>
</html>
