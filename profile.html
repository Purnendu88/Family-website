<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile</title>

<link rel="stylesheet" href="profile.css">

</head>
<body>

<div class="profile-container">

<div class="profile-card">

<img src="images/default-profile.png" id="profileImage">

<h2 id="userName">Rahul Sharma</h2>

<p id="userEmail">rahul@email.com</p>

<hr>

<div class="info">

<p><strong>Phone :</strong> <span id="userPhone">9876543210</span></p>

<p><strong>Date of Birth :</strong> <span id="userDob">01 Jan 2000</span></p>

<p><strong>Blood Group :</strong> <span id="blood">O+</span></p>

<p><strong>Address :</strong> <span id="address">Lucknow, Uttar Pradesh</span></p>

</div>

<button id="editBtn">Edit Profile</button>

</div>

</div>

<script type="module" src="js/profile.js"></script>

</body>
</html>
