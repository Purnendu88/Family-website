<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notifications</title>

    <link rel="stylesheet" href="notification.css">
</head>
<body>

<div class="container">

    <div class="header">

        <h1> Notifications</h1>

    </div>

    <div class="notification unread">

        <div class="icon"></div>

        <div class="content">

            <h3>Birthday Reminder</h3>

            <p>Today is Rahul Sharma's Birthday.</p>

            <span>5 Minutes Ago</span>

        </div>

    </div>

    <div class="notification">

        <div class="icon"></div>

        <div class="content">

            <h3>New Photo Uploaded</h3>

            <p>Aman Sharma uploaded 15 new photos.</p>

            <span>20 Minutes Ago</span>

        </div>

    </div>

    <div class="notification">

        <div class="icon"></div>

        <div class="content">

            <h3>New Member Joined</h3>

            <p>Priya Sharma joined the family website.</p>

            <span>Today</span>

        </div>

    </div>

</div>

</body>
</html>
