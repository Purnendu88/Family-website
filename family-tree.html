<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Family Tree | Sharma Family</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="family-tree.css">
</head>
<body>

<header class="header">
    <h1> Sharma Family Tree</h1>
</header>

<div class="tree">

    <!-- Grandparents -->
    <div class="level">
        <div class="person">
            <img src="../images/default-profile.png" alt="Grandfather">
            <h3>Grandfather</h3>
        </div>

        <div class="person">
            <img src="../images/default-profile.png" alt="Grandmother">
            <h3>Grandmother</h3>
        </div>
    </div>

    <!-- Parents -->
    <div class="level">
        <div class="person">
            <img src="../images/default-profile.png" alt="Father">
            <h3>Father</h3>
        </div>

        <div class="person">
            <img src="../images/default-profile.png" alt="Mother">
            <h3>Mother</h3>
        </div>
    </div>

    <!-- Children -->
    <div class="level">

        <div class="person">
            <img src="../images/default-profile.png" alt="Child 1">
            <h3>Rahul Sharma</h3>
        </div>

        <div class="person">
            <img src="../images/default-profile.png" alt="Child 2">
            <h3>Aman Sharma</h3>
        </div>

        <div class="person">
            <img src="../images/default-profile.png" alt="Child 3">
            <h3>Priya Sharma</h3>
        </div>

    </div>

</div>

</body>
</html>
