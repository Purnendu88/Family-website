<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Gallery | Sharma Family</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="gallery.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

<header class="gallery-header">

    <h1>Sharma Family Gallery</h1>

    <button class="upload-btn">
        <i class="fa-solid fa-upload"></i>
        Upload Photo
    </button>

</header>

<section class="gallery">

    <div class="photo-card">
        <img src="../images/photo1.jpg" alt="Family Photo">

        <div class="photo-info">
            <h3>Wedding Ceremony</h3>

            <div class="actions">
                <button><i class="fa-solid fa-heart"></i></button>
                <button><i class="fa-solid fa-comment"></i></button>
                <button><i class="fa-solid fa-share"></i></button>
            </div>
        </div>

    </div>

    <div class="photo-card">
        <img src="../images/photo2.jpg" alt="Family Photo">

        <div class="photo-info">
            <h3>Birthday Celebration</h3>

            <div class="actions">
                <button><i class="fa-solid fa-heart"></i></button>
                <button><i class="fa-solid fa-comment"></i></button>
                <button><i class="fa-solid fa-share"></i></button>
            </div>
        </div>

    </div>

    <div class="photo-card">
        <img src="../images/photo3.jpg" alt="Family Photo">

        <div class="photo-info">
            <h3>Diwali Festival</h3>

            <div class="actions">
                <button><i class="fa-solid fa-heart"></i></button>
                <button><i class="fa-solid fa-comment"></i></button>
                <button><i class="fa-solid fa-share"></i></button>
            </div>
        </div>

    </div>

</section>

</body>
</html>
